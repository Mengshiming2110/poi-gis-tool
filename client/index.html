<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POI 数据采集工具</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 高德地图 JS API — key 从 localStorage 读取，用户可在设置页配置 -->
    <script type="text/javascript">
      (function() {
        var jsKey = localStorage.getItem('amap_js_key') || '';
        if (!jsKey) {
          var div = document.createElement('div');
          div.innerHTML = '<div style="position:fixed;inset:0;z-index:99999;background:oklch(14% 0.008 250);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif"><div style="text-align:center;max-width:400px;padding:32px"><div style="font-size:48px;margin-bottom:16px">🗺️</div><h2 style="color:oklch(92% 0.004 250);font-size:20px;font-weight:600;margin:0 0 8px">欢迎使用 POI 数据采集工具</h2><p style="color:oklch(62% 0.012 250);font-size:14px;line-height:1.6;margin:0 0 24px">检测到尚未配置高德地图 API Key。<br>请点击下方按钮进入设置页，填入你的高德开放平台 Key。</p><button onclick="document.querySelector(\'.desktop-nav-item\')?.click();this.closest(\'div[style]\').parentElement.remove()" style="padding:10px 32px;border-radius:8px;border:none;background:oklch(58% 0.18 255);color:#fff;font-size:14px;font-weight:600;cursor:pointer">打开系统设置</button><p style="color:oklch(40% 0.012 250);font-size:12px;margin-top:16px">没有 Key？前往 <a href="https://console.amap.com/dev/key/app" target="_blank" style="color:oklch(64% 0.18 255)">高德开放平台</a> 免费申请</p></div></div>';
          document.body.appendChild(div);
          return;
        }
        var security = localStorage.getItem('amap_security_code') || '';
        if (security) {
          window._AMapSecurityConfig = { securityJsCode: security };
        }
        var script = document.createElement('script');
        script.src = 'https://webapi.amap.com/maps?v=2.0&key=' + encodeURIComponent(jsKey) +
          '&plugin=AMap.PlaceSearch,AMap.MouseTool,AMap.Geolocation,AMap.Scale,AMap.ToolBar';
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
